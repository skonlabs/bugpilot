# BugPilot Sample Connector Configuration
# Copy this file and fill in your actual credentials.
# Store secrets in environment variables or a secret manager - never commit real credentials.

connectors:

  # ---------------------------------------------------------------------------
  # Datadog - Observability platform
  # Capabilities: LOGS, METRICS, TRACES, ALERTS
  # ---------------------------------------------------------------------------
  datadog:
    api_key: "dd_api_key_example"          # Datadog API key (Settings → API Keys)
    app_key: "dd_app_key_example"          # Datadog application key (Settings → Application Keys)
    site: "datadoghq.com"                  # Use datadoghq.eu for EU, us3.datadoghq.com for US3, etc.
    # Optional overrides
    timeout_seconds: 30
    max_retries: 3

  # ---------------------------------------------------------------------------
  # Grafana - Visualization and alerting
  # Capabilities: METRICS, ALERTS
  # ---------------------------------------------------------------------------
  grafana:
    url: "https://grafana.example.com"
    api_token: "glsa_example_token_abcdefghijklmnop"   # Service account token (Admin → Service Accounts)
    org_id: 1                              # Grafana organization ID (default: 1)
    # Optional: specify a Prometheus datasource UID to skip auto-discovery
    prometheus_datasource_uid: "prometheus-default"
    timeout_seconds: 30

  # ---------------------------------------------------------------------------
  # AWS CloudWatch - Cloud monitoring and alarming
  # Capabilities: METRICS, ALERTS (via SNS webhook or API polling)
  # ---------------------------------------------------------------------------
  cloudwatch:
    aws_access_key_id: "AKIAIOSFODNN7EXAMPLE"
    aws_secret_access_key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
    region: "us-east-1"
    # Optional: use an IAM role instead of static credentials
    # role_arn: "arn:aws:iam::123456789012:role/BugPilotReadOnly"
    # Optional: filter to specific log groups
    log_group_names:
      - "/aws/lambda/payment-service"
      - "/ecs/checkout-service"

  # ---------------------------------------------------------------------------
  # GitHub - Source control and CI/CD
  # Capabilities: CODE_CHANGES, DEPLOYMENTS
  # ---------------------------------------------------------------------------
  github:
    token: "ghp_example_token_abcdefghijklmnopqrstuvwxyz"  # Personal access token or GitHub App token
    org: "mycompany"
    # Optional: restrict to specific repos
    repos:
      - "payment-service"
      - "checkout-service"
      - "auth-service"
    # Optional: GitHub Enterprise
    # api_base_url: "https://github.example.com/api/v3"

  # ---------------------------------------------------------------------------
  # Kubernetes - Container orchestration
  # Capabilities: INFRASTRUCTURE_STATE, LOGS (via pod log streaming)
  # ---------------------------------------------------------------------------
  kubernetes:
    api_server: "https://kubernetes.example.com:6443"
    token: "eyJhbGciOiJSUzI1NiJ9.eyJpc3MiOiJrdWJlcm5ldGVzL3NlcnZpY2VhY2NvdW50In0.example"
    # Optional: path to CA certificate bundle
    # ca_cert_path: "/etc/ssl/certs/k8s-ca.crt"
    # Optional: use kubeconfig file instead
    # kubeconfig_path: "/home/user/.kube/config"
    namespace: "production"
    # Optional: additional namespaces
    extra_namespaces:
      - "staging"
      - "monitoring"
    timeout_seconds: 30

  # ---------------------------------------------------------------------------
  # PagerDuty - On-call and incident management
  # Capabilities: INCIDENTS, ALERTS
  # ---------------------------------------------------------------------------
  pagerduty:
    api_key: "pd_api_key_example_u+xxxxxxxxxxxx"  # REST API key (API Access Keys)
    from_email: "oncall@example.com"              # Required by PagerDuty API for write operations
    # Optional: filter to specific services
    service_ids:
      - "PXXXXXX"
      - "PYYYYYY"
    # Optional: webhook secret for verifying inbound webhooks
    webhook_secret: "pd_webhook_secret_example"

# ---------------------------------------------------------------------------
# Webhook intake configuration
# ---------------------------------------------------------------------------
webhooks:
  # Shared secrets for verifying inbound webhooks from each source
  # Rotate secrets by setting both current and previous during the grace window.
  datadog:
    secret: "datadog_webhook_secret_example"
    # secret_previous: "old_secret_during_rotation"

  grafana:
    secret: "grafana_webhook_secret_example"

  pagerduty:
    secret: "pagerduty_webhook_secret_example"

  # CloudWatch/SNS uses certificate-based verification - no shared secret needed.
  # Ensure your SNS topic is configured to deliver to:
  # https://your-bugpilot-instance.example.com/v1/webhooks/cloudwatch

# ---------------------------------------------------------------------------
# Global connector settings
# ---------------------------------------------------------------------------
global:
  connector_timeout_seconds: 30
  connector_max_retries: 3
  evidence_collection_timeout_seconds: 45
  raw_payload_retention_days: 7
  evidence_retention_days: 90
