name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # needed to create GitHub Releases and upload assets

jobs:
  # ---------------------------------------------------------------------------
  # Build native binaries on each target OS
  # ---------------------------------------------------------------------------
  build:
    name: Build / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14          # Apple Silicon arm64
            target: bugpilot-macos-arm64
            asset_name: bugpilot-macos-arm64

          - os: macos-14          # Intel x86_64 via Rosetta 2 (no Intel runner available)
            target: bugpilot-macos-x86_64
            asset_name: bugpilot-macos-x86_64
            arch: x86_64

          - os: ubuntu-22.04      # Linux x86_64 (glibc 2.35 — compatible with most distros)
            target: bugpilot-linux-x86_64
            asset_name: bugpilot-linux-x86_64

          - os: windows-latest    # Windows x86_64
            target: bugpilot-windows-x86_64
            asset_name: bugpilot-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CLI and PyInstaller
        run: |
          ${{ matrix.arch && format('arch -{0}', matrix.arch) || '' }} pip install ./src/cli
          ${{ matrix.arch && format('arch -{0}', matrix.arch) || '' }} pip install "pyinstaller>=6.0"

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        run: |
          ${{ matrix.arch && format('arch -{0}', matrix.arch) || '' }} pyinstaller src/cli/bugpilot.spec \
            --distpath dist \
            --workpath build
          mv dist/bugpilot dist/${{ matrix.asset_name }}

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller src/cli/bugpilot.spec --distpath dist --workpath build
          Move-Item dist\bugpilot.exe dist\${{ matrix.asset_name }}

      - name: Smoke test (Unix)
        if: runner.os != 'Windows' && !matrix.arch
        run: dist/${{ matrix.asset_name }} --version

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: dist\${{ matrix.asset_name }} --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Create GitHub Release with all binary assets attached
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Make Unix binaries executable
        run: chmod +x dist/bugpilot-macos-* dist/bugpilot-linux-* 2>/dev/null || true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum bugpilot-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE=""
          if [[ "$TAG" == *"-"* ]]; then
            PRERELEASE="--prerelease"
          fi
          # Delete any existing release for this tag (handles retries)
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $PRERELEASE \
            dist/bugpilot-macos-arm64 \
            dist/bugpilot-macos-x86_64 \
            dist/bugpilot-linux-x86_64 \
            dist/bugpilot-windows-x86_64.exe \
            dist/checksums.txt

  # ---------------------------------------------------------------------------
  # Update Homebrew tap formula with new version + sha256s
  # ---------------------------------------------------------------------------
  update-tap:
    name: Update Homebrew tap
    needs: [release]
    runs-on: ubuntu-22.04

    steps:
      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release download "$TAG" \
            --repo skonlabs/bugpilot \
            --pattern "checksums.txt" \
            --output checksums.txt
          cat checksums.txt

      - name: Update tap formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"  # strip leading 'v'

          ARM64_SHA=$(grep "bugpilot-macos-arm64" checksums.txt | awk '{print $1}')
          INTEL_SHA=$(grep "bugpilot-macos-x86_64" checksums.txt | awk '{print $1}')

          # Fetch current file + its SHA (needed for GitHub Contents API update)
          RESPONSE=$(curl -s -H "Authorization: token $TAP_TOKEN" \
            "https://api.github.com/repos/skonlabs/homebrew-tap/contents/Formula/bugpilot.rb")
          FILE_SHA=$(echo "$RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])")

          NEW_CONTENT=$(cat <<FORMULA
          # Homebrew formula for the BugPilot CLI.
          class Bugpilot < Formula
            desc     "CLI-first developer tool for debugging production incidents"
            homepage "https://bugpilot.io"
            version  "$VERSION"
            license  "Proprietary"

            on_macos do
              on_arm do
                url "https://github.com/skonlabs/bugpilot/releases/download/v#{version}/bugpilot-macos-arm64"
                sha256 "$ARM64_SHA"
              end
              on_intel do
                url "https://github.com/skonlabs/bugpilot/releases/download/v#{version}/bugpilot-macos-x86_64"
                sha256 "$INTEL_SHA"
              end
            end

            def install
              if Hardware::CPU.intel?
                bin.install "bugpilot-macos-x86_64" => "bugpilot"
              else
                bin.install "bugpilot-macos-arm64" => "bugpilot"
              end
            end

            def caveats
              <<~EOS
                Shell completions are not installed automatically.
                To enable them, add one of the following to your shell profile:

                  # bash (~/.bash_profile or ~/.bashrc)
                  eval "\\$(bugpilot --completion bash)"

                  # zsh (~/.zshrc)
                  eval "\\$(bugpilot --completion zsh)"

                  # fish (~/.config/fish/config.fish)
                  bugpilot --completion fish | source
              EOS
            end

            test do
              system "#{bin}/bugpilot", "--version"
            end
          end
          FORMULA
          )

          ENCODED=$(echo "$NEW_CONTENT" | python3 -c "import sys,base64; print(base64.b64encode(sys.stdin.buffer.read()).decode())")

          curl -s -X PUT -H "Authorization: token $TAP_TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/skonlabs/homebrew-tap/contents/Formula/bugpilot.rb" \
            -d "{\"message\": \"chore: bump bugpilot to v$VERSION\", \"content\": \"$ENCODED\", \"sha\": \"$FILE_SHA\"}" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('content',{}).get('name') or d.get('message','error'))"
