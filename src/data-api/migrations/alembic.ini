# BugPilot — Alembic configuration
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts directory (relative to this file)
script_location = .

# SQLAlchemy database URL.
# Overridden at runtime by DATABASE_URL env var in env.py.
sqlalchemy.url = postgresql+asyncpg://bugpilot:bugpilot@localhost:5432/bugpilot

# Version table name (default: alembic_version)
version_table = alembic_version

# File naming template for new migration scripts
file_template = %%(rev)s_%%(slug)s

# Timezone for revision file creation timestamps
# timezone = UTC

# Maximum length for slug in file names
truncate_slug_length = 40

# Output encoding
output_encoding = utf-8


# ---------------------------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
