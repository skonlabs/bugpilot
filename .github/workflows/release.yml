name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # needed to create GitHub Releases and upload assets

jobs:
  # ---------------------------------------------------------------------------
  # Build native binaries on each target OS
  # ---------------------------------------------------------------------------
  build:
    name: Build / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14          # Apple Silicon arm64
            target: bugpilot-macos-arm64
            asset_name: bugpilot-macos-arm64

          - os: ubuntu-22.04      # Linux x86_64 (glibc 2.35 — compatible with most distros)
            target: bugpilot-linux-x86_64
            asset_name: bugpilot-linux-x86_64

          - os: windows-latest    # Windows x86_64
            target: bugpilot-windows-x86_64
            asset_name: bugpilot-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CLI and PyInstaller
        run: |
          pip install ./src/cli
          pip install "pyinstaller>=6.0"

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        run: |
          pyinstaller src/cli/bugpilot.spec \
            --distpath dist \
            --workpath build
          mv dist/bugpilot dist/${{ matrix.asset_name }}

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller src/cli/bugpilot.spec --distpath dist --workpath build
          Move-Item dist\bugpilot.exe dist\${{ matrix.asset_name }}

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: dist/${{ matrix.asset_name }} --version

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: dist\${{ matrix.asset_name }} --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # PyPI publishing — disabled until trusted publisher is configured on pypi.org
  # To re-enable: uncomment this job and set up the 'pypi' environment in repo settings
  # ---------------------------------------------------------------------------
  # pypi:
  #   name: Publish to PyPI
  #   runs-on: ubuntu-22.04
  #   environment: pypi
  #   permissions:
  #     id-token: write
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-python@v5
  #       with:
  #         python-version: "3.11"
  #     - run: pip install hatch && cd src/cli && hatch build
  #     - uses: pypa/gh-action-pypi-publish@release/v1
  #       with:
  #         packages-dir: src/cli/dist/

  # ---------------------------------------------------------------------------
  # Create GitHub Release with all binary assets attached
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Make Unix binaries executable
        run: chmod +x dist/bugpilot-macos-* dist/bugpilot-linux-* 2>/dev/null || true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum bugpilot-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE=""
          if [[ "${{ github.ref_name }}" == *"-"* ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            $PRERELEASE \
            dist/bugpilot-macos-arm64 \
            dist/bugpilot-linux-x86_64 \
            dist/bugpilot-windows-x86_64.exe \
            dist/checksums.txt
