name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Build Go CLI binaries ──────────────────────────────────────────────────
  build:
    name: Build / ${{ matrix.asset_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            asset_name: bugpilot-linux-amd64
            upx: true

          - os: ubuntu-22.04
            goos: linux
            goarch: arm64
            asset_name: bugpilot-linux-arm64
            upx: true

          - os: macos-14
            goos: darwin
            goarch: arm64
            asset_name: bugpilot-macos-arm64
            upx: false

          - os: macos-14
            goos: darwin
            goarch: amd64
            asset_name: bugpilot-macos-amd64
            upx: false

          - os: windows-latest
            goos: windows
            goarch: amd64
            asset_name: bugpilot-windows-amd64.exe
            upx: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p ../dist
          go build -ldflags="-s -w -X github.com/skonlabs/bugpilot/cmd.Version=${{ github.ref_name }}" \
            -o ../dist/${{ matrix.asset_name }} .

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        working-directory: cli
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ..\dist | Out-Null
          go build -ldflags "-s -w -X github.com/skonlabs/bugpilot/cmd.Version=${{ github.ref_name }}" `
            -o ..\dist\${{ matrix.asset_name }} .

      - name: Compress with UPX (Linux)
        if: matrix.upx && runner.os == 'Linux'
        run: |
          sudo apt-get install -y upx-ucl
          upx --best --lzma dist/${{ matrix.asset_name }}

      - name: Compress with UPX (Windows)
        if: matrix.upx && runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install upx -y --no-progress
          upx --best --lzma dist\${{ matrix.asset_name }}

      - name: Smoke test (native only)
        if: (matrix.goos == 'linux' && matrix.goarch == 'amd64' && runner.os == 'Linux') || (matrix.goos == 'darwin' && runner.os == 'macOS')
        run: dist/${{ matrix.asset_name }} version

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Make Unix binaries executable
        run: chmod +x dist/bugpilot-macos-* dist/bugpilot-linux-* 2>/dev/null || true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum bugpilot-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE=""
          if [[ "$TAG" == *"-"* ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $PRERELEASE \
            dist/bugpilot-linux-amd64 \
            dist/bugpilot-linux-arm64 \
            dist/bugpilot-macos-arm64 \
            dist/bugpilot-macos-amd64 \
            dist/bugpilot-windows-amd64.exe \
            dist/checksums.txt

  # ── Update Homebrew tap ────────────────────────────────────────────────────
  update-tap:
    name: Update Homebrew tap
    needs: [release]
    runs-on: ubuntu-22.04

    steps:
      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo skonlabs/bugpilot \
            --pattern "checksums.txt" \
            --output checksums.txt
          cat checksums.txt

      - name: Update tap formula
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          ARM64_SHA=$(grep "bugpilot-macos-arm64" checksums.txt | awk '{print $1}')
          INTEL_SHA=$(grep "bugpilot-macos-amd64" checksums.txt | awk '{print $1}')

          [[ -n "$ARM64_SHA" ]] || { echo "ERROR: arm64 sha not found in checksums.txt"; exit 1; }
          [[ -n "$INTEL_SHA" ]] || { echo "ERROR: amd64 sha not found in checksums.txt"; exit 1; }

          echo "arm64 sha: $ARM64_SHA"
          echo "amd64 sha: $INTEL_SHA"

          # Fetch current file SHA required by the GitHub Contents API for updates
          FILE_SHA=$(gh api repos/skonlabs/homebrew-tap/contents/Formula/bugpilot.rb \
            --jq '.sha')
          [[ -n "$FILE_SHA" ]] || { echo "ERROR: could not retrieve file SHA from tap repo"; exit 1; }

          # Build formula content without a heredoc (YAML interprets << as merge key)
          NEW_CONTENT=$(printf '%s\n' \
            'class Bugpilot < Formula' \
            '  desc     "CLI-first developer tool for debugging production incidents"' \
            '  homepage "https://bugpilot.io"' \
            "  version  \"$VERSION\"" \
            '  license  "Proprietary"' \
            '' \
            '  on_arm do' \
            '    url "https://github.com/skonlabs/bugpilot/releases/download/v#{version}/bugpilot-macos-arm64"' \
            "    sha256 \"$ARM64_SHA\"" \
            '  end' \
            '' \
            '  on_intel do' \
            '    url "https://github.com/skonlabs/bugpilot/releases/download/v#{version}/bugpilot-macos-amd64"' \
            "    sha256 \"$INTEL_SHA\"" \
            '  end' \
            '' \
            '  def install' \
            '    if Hardware::CPU.arm?' \
            '      bin.install "bugpilot-macos-arm64" => "bugpilot"' \
            '    else' \
            '      bin.install "bugpilot-macos-amd64" => "bugpilot"' \
            '    end' \
            '  end' \
            '' \
            '  def caveats' \
            '    <<~EOS' \
            '      Shell completions are not installed automatically.' \
            '      To enable them, add one of the following to your shell profile:' \
            '' \
            '        # bash (~/.bash_profile or ~/.bashrc)' \
            '        eval "$(bugpilot --completion bash)"' \
            '' \
            '        # zsh (~/.zshrc)' \
            '        eval "$(bugpilot --completion zsh)"' \
            '' \
            '        # fish (~/.config/fish/config.fish)' \
            '        bugpilot --completion fish | source' \
            '    EOS' \
            '  end' \
            '' \
            '  test do' \
            '    system "#{bin}/bugpilot", "--version"' \
            '  end' \
            'end' \
          )

          # base64 -w0 produces a single unwrapped line — safe to embed in JSON
          ENCODED=$(printf '%s' "$NEW_CONTENT" | base64 -w0)

          gh api repos/skonlabs/homebrew-tap/contents/Formula/bugpilot.rb \
            --method PUT \
            -f message="chore: bump bugpilot to v$VERSION" \
            -f content="$ENCODED" \
            -f sha="$FILE_SHA" \
            --jq '.content.name'
          echo "Tap formula updated to v$VERSION"

  # ── Update Scoop manifest ──────────────────────────────────────────────────
  update-scoop:
    name: Update Scoop manifest
    needs: [release]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo skonlabs/bugpilot \
            --pattern "checksums.txt" \
            --output checksums.txt

      - name: Update scoop manifest version and hash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          WIN_SHA=$(grep "bugpilot-windows-amd64.exe" checksums.txt | awk '{print $1}')

          python3 - <<EOF
          import json, pathlib
          m = json.loads(pathlib.Path("cli/pkg/scoop/bugpilot.json").read_text())
          m["version"] = "$VERSION"
          m["architecture"]["64bit"]["url"] = f"https://github.com/skonlabs/bugpilot/releases/download/v$VERSION/bugpilot-windows-amd64.exe"
          m["architecture"]["64bit"]["hash"] = "$WIN_SHA"
          pathlib.Path("cli/pkg/scoop/bugpilot.json").write_text(json.dumps(m, indent=2) + "\n")
          EOF

      - name: Commit updated Scoop manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cli/pkg/scoop/bugpilot.json
          git diff --staged --quiet || git commit -m "chore: bump scoop manifest to ${{ github.ref_name }}"
          git push origin HEAD:main
