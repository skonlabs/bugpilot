name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Build Go CLI binaries ──────────────────────────────────────────────────
  build:
    name: Build / ${{ matrix.asset_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            asset_name: bugpilot-linux-amd64
            upx: true

          - os: ubuntu-22.04
            goos: linux
            goarch: arm64
            asset_name: bugpilot-linux-arm64
            upx: true

          - os: macos-14
            goos: darwin
            goarch: arm64
            asset_name: bugpilot-macos-arm64
            upx: false

          - os: macos-14
            goos: darwin
            goarch: amd64
            asset_name: bugpilot-macos-amd64
            upx: false

          - os: windows-latest
            goos: windows
            goarch: amd64
            asset_name: bugpilot-windows-amd64.exe
            upx: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p ../dist
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ../dist/${{ matrix.asset_name }} .

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        working-directory: cli
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ..\dist | Out-Null
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" `
            -o ..\dist\${{ matrix.asset_name }} .

      - name: Compress with UPX (Linux)
        if: matrix.upx && runner.os == 'Linux'
        run: |
          sudo apt-get install -y upx-ucl
          upx --best --lzma dist/${{ matrix.asset_name }}

      - name: Compress with UPX (Windows)
        if: matrix.upx && runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install upx -y --no-progress
          upx --best --lzma dist\${{ matrix.asset_name }}

      - name: Smoke test (native only)
        if: (matrix.goos == 'linux' && runner.os == 'Linux') || (matrix.goos == 'darwin' && runner.os == 'macOS')
        run: dist/${{ matrix.asset_name }} --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Make Unix binaries executable
        run: chmod +x dist/bugpilot-macos-* dist/bugpilot-linux-* 2>/dev/null || true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum bugpilot-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE=""
          if [[ "$TAG" == *"-"* ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $PRERELEASE \
            dist/bugpilot-linux-amd64 \
            dist/bugpilot-linux-arm64 \
            dist/bugpilot-macos-arm64 \
            dist/bugpilot-macos-amd64 \
            dist/bugpilot-windows-amd64.exe \
            dist/checksums.txt

  # ── Update Homebrew tap ────────────────────────────────────────────────────
  update-tap:
    name: Update Homebrew tap
    needs: [release]
    runs-on: ubuntu-22.04

    steps:
      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo skonlabs/bugpilot \
            --pattern "checksums.txt" \
            --output checksums.txt
          cat checksums.txt

      - name: Update tap formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ARM64_SHA=$(grep "bugpilot-macos-arm64" checksums.txt | awk '{print $1}')
          INTEL_SHA=$(grep "bugpilot-macos-amd64" checksums.txt | awk '{print $1}')

          RESPONSE=$(curl -s -H "Authorization: token $TAP_TOKEN" \
            "https://api.github.com/repos/skonlabs/homebrew-tap/contents/Formula/bugpilot.rb")
          FILE_SHA=$(echo "$RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])")

          NEW_CONTENT=$(cat <<FORMULA
          class Bugpilot < Formula
            desc     "CLI-first developer tool for debugging production incidents"
            homepage "https://bugpilot.io"
            version  "$VERSION"
            license  "Proprietary"

            on_macos do
              on_arm do
                url "https://github.com/skonlabs/bugpilot/releases/download/v#{version}/bugpilot-macos-arm64"
                sha256 "$ARM64_SHA"
              end
              on_intel do
                url "https://github.com/skonlabs/bugpilot/releases/download/v#{version}/bugpilot-macos-amd64"
                sha256 "$INTEL_SHA"
              end
            end

            def install
              if Hardware::CPU.intel?
                bin.install "bugpilot-macos-amd64" => "bugpilot"
              else
                bin.install "bugpilot-macos-arm64" => "bugpilot"
              end
            end

            test do
              system "#{bin}/bugpilot", "--version"
            end
          end
          FORMULA
          )

          ENCODED=$(echo "$NEW_CONTENT" | python3 -c "import sys,base64; print(base64.b64encode(sys.stdin.buffer.read()).decode())")

          curl -s -X PUT -H "Authorization: token $TAP_TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/skonlabs/homebrew-tap/contents/Formula/bugpilot.rb" \
            -d "{\"message\": \"chore: bump bugpilot to v$VERSION\", \"content\": \"$ENCODED\", \"sha\": \"$FILE_SHA\"}" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('content',{}).get('name') or d.get('message','error'))"

  # ── Update Scoop manifest ──────────────────────────────────────────────────
  update-scoop:
    name: Update Scoop manifest
    needs: [release]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo skonlabs/bugpilot \
            --pattern "checksums.txt" \
            --output checksums.txt

      - name: Update scoop manifest version and hash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          WIN_SHA=$(grep "bugpilot-windows-amd64.exe" checksums.txt | awk '{print $1}')

          python3 - <<EOF
          import json, pathlib
          m = json.loads(pathlib.Path("pkg/scoop/bugpilot.json").read_text())
          m["version"] = "$VERSION"
          m["architecture"]["64bit"]["url"] = f"https://github.com/skonlabs/bugpilot/releases/download/v$VERSION/bugpilot-windows-amd64.exe"
          m["architecture"]["64bit"]["hash"] = "$WIN_SHA"
          pathlib.Path("pkg/scoop/bugpilot.json").write_text(json.dumps(m, indent=2) + "\n")
          EOF

      - name: Commit updated Scoop manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pkg/scoop/bugpilot.json
          git diff --staged --quiet || git commit -m "chore: bump scoop manifest to ${{ github.ref_name }}"
          git push origin HEAD:main
